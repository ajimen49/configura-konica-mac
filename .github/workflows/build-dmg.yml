name: Construeix el DMG

on:
  release:
    types: [published]

jobs:
  build-dmg:
    name: Crea el DMG en macOS
    runs-on: macos-latest

    steps:

      - name: Descarrega el repositori
        uses: actions/checkout@v5

      - name: Descarrega el ZIP del Release
        run: |
          # Descarrega el primer ZIP que trobi als assets del Release
          ASSET_URL=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/${{ github.event.release.id }}/assets" \
            | python3 -c "
          import sys, json
          assets = json.load(sys.stdin)
          for a in assets:
              if a['name'].endswith('.zip') and 'Source' not in a['name']:
                  print(a['url'])
                  break
          ")

          echo "Asset URL: $ASSET_URL"

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "$ASSET_URL" \
            -o app.zip

          echo "ZIP descarregat: $(du -sh app.zip)"
          unzip -l app.zip | head -5

      - name: Prepara l'app i crea el DMG
        run: |
          VERSION="${{ github.event.release.tag_name }}"

          unzip app.zip
          xattr -cr "app-staging/Configura_Konica_Mac.app" 2>/dev/null || true
          chmod +x "app-staging/Configura_Konica_Mac.app/Contents/MacOS/Configura_Konica_Mac"

          hdiutil create \
            -volname "Configura Konica Mac" \
            -srcfolder "app-staging/" \
            -ov \
            -format UDZO \
            -o "Configura_Konica_Mac-${VERSION}.dmg"

          echo "DMG_PATH=Configura_Konica_Mac-${VERSION}.dmg" >> $GITHUB_ENV
          ls -lh "Configura_Konica_Mac-${VERSION}.dmg"

      - name: Adjunta el DMG al Release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ env.DMG_PATH }}" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
