name: Construeix el DMG

on:
  release:
    types: [published]

jobs:
  build-dmg:
    name: Crea el DMG en macOS
    runs-on: macos-latest

    steps:

      - name: Descarrega el repositori
        uses: actions/checkout@v4

      - name: Descarrega el ZIP del Release
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          REPO="${{ github.repository }}"
          ZIP_NAME="Configura_Konica_Mac-${VERSION}.zip"

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "https://github.com/${REPO}/releases/download/${VERSION}/${ZIP_NAME}" \
            -o app.zip

          echo "ZIP descarregat: $(du -sh app.zip)"

      - name: Prepara l'app i crea el DMG
        run: |
          VERSION="${{ github.event.release.tag_name }}"

          unzip app.zip
          xattr -cr "app-staging/Configura_Konica_Mac.app" 2>/dev/null || true
          chmod +x "app-staging/Configura_Konica_Mac.app/Contents/MacOS/Configura_Konica_Mac"

          hdiutil create \
            -volname "Configura Konica Mac" \
            -srcfolder "app-staging/" \
            -ov \
            -format UDZO \
            -o "Configura_Konica_Mac-${VERSION}.dmg"

          echo "DMG_PATH=Configura_Konica_Mac-${VERSION}.dmg" >> $GITHUB_ENV
          echo "DMG creat: $(du -sh Configura_Konica_Mac-${VERSION}.dmg)"

      - name: Adjunta el DMG al Release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ env.DMG_PATH }}" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
